<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Setup</title>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="brython()">
    <h1>Moves Counter</h1>

    <div class="controls">
        <button class="btn" id="wtg-btn">White to go</button>
        <button class="btn" id="toggle-btn">Empty board</button>
        <button class="btn" id="flip-btn">View from Black</button>
        <button class="btn" id="count-btn">Count moves</button>
    </div>

    <div id="stats-bar" class="stats-bar hidden"></div>

    <div class="chess-layout" id="chess-layout"></div>

    <script type="text/python" src="chess.py"></script>
</body>
</html>
