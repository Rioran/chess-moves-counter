<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Setup</title>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="brython()">
    <h1>Moves Counter</h1>

    <div class="controls">
        <div class="btn-group">
            <button class="btn flip-white" id="flip-btn">⇅</button>
            <button class="btn wtg-white" id="wtg-btn">Go, White!</button>
            <button class="btn" id="toggle-btn">🗑</button>
        </div>
        <div class="btn-group" id="count-group">
            <button class="btn" id="count-btn">Count moves</button>
            <div class="depth-wrapper">
                <input type="number" id="depth-input" class="depth-input" value="1" min="1" max="6">
                <div class="depth-arrows">
                    <button class="depth-arrow" id="depth-up" type="button">▲</button>
                    <button class="depth-arrow" id="depth-down" type="button">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div id="stats-bar" class="stats-bar hidden"></div>

    <div class="chess-layout" id="chess-layout"></div>

    <script type="text/python" src="chess.py"></script>
</body>
</html>
